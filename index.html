<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Dashboard</title>

    <!-- Favicon & Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/apple-touch-icon.png" />

    <!-- Social / WhatsApp preview -->
    <meta property="og:title" content="Nauka Sales Dashboard" />
    <meta property="og:description" content="Weekly Sales Snapshot · LPI International" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Nauka fonts -->
    <style>
      @font-face {
        font-family: 'Larken';
        src: url('/Larken-Medium.otf') format('opentype');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'FreightSans Pro';
        src: url('/FreightSansProBook-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'FreightSans Pro', 'Trebuchet MS', sans-serif;
        background: #F5F3EA;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
